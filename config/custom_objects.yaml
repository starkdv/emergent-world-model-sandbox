# =========================================================================
# Custom Object Definitions
# =========================================================================
#
# HOW TO USE:
#   python scripts/objects.py validate config/custom_objects.yaml   # 1 second
#   python scripts/objects.py preview  config/custom_objects.yaml   # behaviour
#   python main.py --gui --objects config/custom_objects.yaml       # run it
#
# Full schema reference + cookbook: docs/OBJECTS_GUIDE.md
#
# THE THREE RULES PEOPLE TRIP ON:
#   1. Add a `spawn:` section (initial_count and/or respawn_rate) or the
#      type will never appear — the validator warns you about this.
#   2. Every type needs a distinct `vision_encoding` or agents literally
#      cannot tell it apart from another type — use "auto" to get a free
#      slot in your category's band, or the validator warns on collisions.
#   3. Chains must close: grows_into / produces / decompose_into must name
#      types that exist — the validator errors on dangling references.
#
# `extends: <type_id>` inherits everything from a builtin (berry,
# berry_seed, berry_plant, fertilizer, sand) or an earlier entry in this
# file — you only write what differs. Spawn settings are never inherited.
#
# =========================================================================

objects:

  # A high-calorie superfood: 5 lines of substance instead of 60.
  golden_apple:
    extends: berry
    display_name: "Golden Apple"
    edible: { calories: 60.0 }                       # 3x a berry
    physics: { decay_rate: 0.02, decompose_into: "", decompose_chance: 0.0 }
    observation: { vision_encoding: 0.95 }
    render: { char: "G", color: [255, 215, 0] }
    spawn: { initial_count: 10, terrain: "soil", respawn_rate: 0.005, max_count: 10 }

  # A poisonous look-alike — agents must learn to discriminate.
  mushroom:
    extends: berry
    display_name: "Poisonous Mushroom"
    edible: { calories: -20.0, toxicity: 0.8 }       # drains energy
    physics: { decay_rate: 0.003, decompose_into: "", decompose_chance: 0.0, nutrient_return: 0.05 }
    observation: { vision_encoding: 0.87 }
    render: { char: "M", color: [148, 0, 211] }
    spawn: { initial_count: 6, terrain: "soil", respawn_rate: 0.01, max_count: 8 }

  # A slow tree: seed + plant pair (chains must reference each other).
  acorn:
    extends: berry_seed
    display_name: "Acorn"
    seed: { grows_into: "oak_tree", grow_time: 120, required_fertility: 0.4,
            required_moisture: 0.3, max_age: 400 }
    observation: { vision_encoding: 0.55 }
    render: { char: "a", color: [139, 90, 43] }
    spawn: { initial_count: 5, terrain: "plantable" }

  oak_tree:
    extends: berry_plant
    display_name: "Oak Tree"
    plant: { mature_age: 300, max_age: 2000, produces: "acorn", spawn_rate: 0.03 }
    physics: { nutrient_return: 0.25 }
    observation: { vision_encoding: 0.70 }
    render: { char: "T", color: [0, 100, 0] }
    spawn: { initial_count: 3, terrain: "plantable" }

  # A growth-boosting terrain patch (tile_effect fields default to "off",
  # so only the boosts need writing).
  oasis:
    display_name: "Oasis"
    category: "terrain"
    interaction: { pickable: false, usable: false, passable: true, blocks_growth: false }
    tile_effect: { germination_multiplier: 2.5, growth_multiplier: 2.0,
                   spawn_rate_multiplier: 1.5, spread_chance: 0.0 }
    observation: { vision_encoding: 0.20 }
    render: { char: "O", color: [0, 191, 255] }
    spawn: { initial_count: 4, terrain: "soil" }
