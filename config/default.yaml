# Emergent World-Model Sandbox Configuration
# Author: Karan Vasa

# World Settings
world:
  width: 100
  height: 100
  initial_resources: 50
  resource_spawn_rate: 0.01
  seed: null  # null for random, or specify integer for reproducible runs
  allow_stacking: false  # If false, enforces one object per tile (prevents overlapping)

# Terrain Settings
terrain:
  soil_ratio: 0.695
  rock_ratio: 0.2
  water_ratio: 0.1
  sand_ratio: 0.005
  fertility_range: [0.3, 1.0]
  moisture_range: [0.2, 0.8]

# Agent Settings
agents:
  initial_population: 20
  starting_energy: 100.0
  max_energy: 200.0
  metabolism_rate: 0.5
  vision_radius: 5
  max_age: 1000
  inventory_size: 5

# Neural Network Settings (GRU + Actor-Critic)
brain:
  # Architecture version:
  #   2 = legacy GRU-MLP (~8.9k params) — the controlled baseline
  #   3 = attention perception + [z,h] value head (~17k params):
  #       a small embedding shared by all vision tiles + an attention
  #       pool driven by the agent's internal state, a larger GRU, and
  #       a value head that sees the current state directly.
  #       See agents/brain/v3.py and docs/BRAIN_V3_PROPOSAL.md §3.
  version: 2

  # --- v2 sizes (used when version: 2) ---
  input_size: 72  # calculated from observation vector (8 agent + 50 vision + 8 stimulus + 6 inventory)
  encoder_layers: [32]  # Encoder MLP hidden layers
  gru_hidden_size: 32  # GRU hidden state size (memory)
  output_size: 8  # number of actions
  activation: "tanh"

  # --- v3 sizes (used when version: 3) ---
  v3:
    embed_dim: 8       # per-tile embedding size (E), shared by all 25 tiles
    state_dim: 40      # state encoder output (S); GRU input = S + E
    gru_hidden_size: 48
    value_hidden: 16   # hidden layer of the [z,h] value MLP

  # Learned world model (Brain v3 Phase 4). Adds a latent dynamics head
  # to the genome that predicts (next latent, reward) from (hidden state,
  # action). Works with both brain versions. Enables:
  #   - curiosity (learning.curiosity): prediction error → intrinsic reward
  #   - planning (below): imagined latent rollouts pick the next action
  # The head is trained by the PPO learner (algorithm: ppo); under a2c or
  # pure neuroevolution it only evolves.
  # NOTE: enabling changes the genome length (the head lives in the genome).
  world_model:
    enabled: false
    hidden: 32           # dynamics MLP hidden width
    planner:
      enabled: false     # model-based action selection (costly per tick)
      depth: 3           # imagination horizon
      samples: 16        # candidate rollouts per decision
      gamma: 0.95        # discount inside the rollout

  # Bootstrap instincts (Brain v3 Phase 2).
  # Small additive biases on the action logits that scaffold early survival
  # (pick up food, eat when hungry, turn toward food). They FADE linearly
  # with agent age so adult behaviour is produced purely by the learned
  # network — this is what keeps the project's emergence-first claim honest.
  # The old hardcoded auto-eat override (forced EAT below 50% energy) was
  # replaced by the hunger_eat_bias prior, which the policy can override.
  instincts:
    enabled: true        # false = pure network from birth (hard mode ablation)
    fade_age: 150        # ticks until instincts reach zero (null = never fade,
                         #   which reproduces the legacy v2 behaviour)
    hunger_eat_bias: 3.0 # extra EAT logit bias at maximum hunger (scaled by
                         #   the energy_urgency stimulus and by the fade)

# Evolution Settings
evolution:
  mode: "rl"  # "rl" (RL + evolution) or "neuroevolution" (pure evolution, no gradient learning)
  selection_method: "tournament"  # "tournament" or "mutation" or "crossover"
  tournament_size: 5
  mutation_rate: 0.01
  mutation_std: 0.1
  trait_mutation_std: 0.05
  crossover_method: "uniform"
  elitism_count: 2
  generation_length: 1000  # ticks per generation

# Plant Settings
plants:
  growth_time: 50
  mature_age: 100
  max_age: 500
  seed_spawn_rate: 0.1
  required_fertility: 0.3
  required_moisture: 0.2
  germination_success_rate: 0.75  # 75% chance seed successfully germinates
  fertility_consumption_per_tick: 0.001  # How much fertility plants consume
  moisture_consumption_per_tick: 0.0005  # How much moisture plants consume
  seed_max_age: 200  # Maximum age before seed rots (in ticks)
  # Carrying capacity — competition for space/light. A seed will not
  # germinate if this many (or more) plants already sit within
  # neighbor_radius of it. Without this the plant population grows
  # unbounded (each mature plant produces ~20 offspring over its life),
  # so plants — and the berries they spawn — tile the whole world.
  # Set max_neighbor_plants: 0 to disable (legacy unbounded growth).
  # Defaults (cap 3 in a 5x5 window) plateau plant coverage at ~24% of
  # plantable tiles instead of saturating the world to ~65% and climbing.
  max_neighbor_plants: 3   # cap within the crowding window
  neighbor_radius: 2       # 2 = the 5x5 window around the seed

# Resource Settings
resources:
  berry_calories: 20.0
  berry_freshness_decay: 0.01
  seed_drop_chance: 0.7  # Chance for decomposed berries to drop seeds
  seed_energy_cost: 5.0

# Soil Dynamics Settings
soil:
  fertility_recovery_rate: 0.0005  # Per tick recovery for empty soil
  fertility_return_on_death: 0.15  # Nutrients returned when plant dies
  moisture_evaporation_rate: 0.0002  # Natural moisture loss
  moisture_recovery_rate: 0.0008  # Rain/groundwater replenishment per tick
  max_fertility: 1.0
  min_fertility: 0.0
  max_moisture: 1.0
  min_moisture: 0.0

# Environment Engine (World upgrade W1) — day/night, seasons, weather
# When enabled, ONE system computes global light/temperature/weather each
# tick and existing systems consume plain multipliers from it:
#   - plant growth × light × temperature window
#   - germination × temperature window
#   - food production × light
#   - decay × (0.5 + temperature)  (hot = spoils faster)
#   - agent metabolism × (1 + coef·|temp − 0.5|·2)  (extremes cost energy)
# It also REPLACES the soil moisture arithmetic: evaporation scales with
# temperature/light, and recovery happens ONLY during rain events or next
# to water tiles (this is the fix for bug B1 — moisture used to only rise).
# Disabled (default) = bit-compatible legacy behaviour, all multipliers 1.0.
environment:
  enabled: false               # Master switch (false = legacy static climate)
  day_length: 200              # Ticks per full day/night cycle
  min_light: 0.25              # Light level at deepest night (1.0 = noon)
  season_length: 2000          # Ticks per full seasonal cycle
  season_temp_amplitude: 0.25  # Seasonal swing around base_temperature
  base_temperature: 0.5        # Yearly mean (0.5 = centre of comfort band)
  daynight_temp_amplitude: 0.10  # Day-vs-night temperature swing
  metabolism_temp_coef: 0.5    # Extra energy drain at temperature extremes
  base_evaporation: 0.0012     # Soil moisture loss/tick (× temp & light)
  water_adjacency_recovery: 0.002  # Moisture gain/tick next to WATER tiles
  weather:
    rain_start_chance: 0.01    # Per-tick chance rain begins (clear weather)
    rain_duration: 60          # Ticks a rain event lasts
    rain_recovery: 0.004       # Moisture gain/tick while raining
    drought_start_chance: 0.002  # Per-tick chance a drought begins
    drought_duration: 150      # Ticks a drought lasts
    drought_evaporation_factor: 2.0  # Evaporation multiplier in drought

# Simulation Settings
simulation:
  max_generations: 100
  ticks_per_second: 10
  auto_save: true
  save_interval: 10  # generations
  parallel: true  # Parallel agent updates (observe+decide & learn run threaded)

# Visualization Settings
visualization:
  enabled: true
  window_width: 1200
  window_height: 800
  fps: 30
  target_fps: 30  # Used by GUI loop
  show_vision_radius: true
  show_agent_info: true
  color_scheme:
    background: [34, 34, 34]
    soil: [139, 69, 19]
    rock: [128, 128, 128]
    water: [64, 164, 223]
    sand: [210, 180, 120]
    agent: [0, 255, 0]
    plant: [34, 139, 34]
    seed: [210, 180, 140]
    food: [255, 140, 0]

# Data Collection Settings
data_collection:
  enabled: true
  export_format: "csv"  # csv, json, parquet
  collect_per_tick: false
  collect_per_generation: true
  track_lineage: true
  track_behaviors: true
  export_directory: "data/exports"

# Learning Settings (for --learning flag)
learning:
  enabled: false  # Set via command line

  # Lifetime-learning algorithm (Brain v3 Phase 3b):
  #   a2c — legacy Actor-Critic: random single-transition replay, TD(0)
  #         advantage, manual gradients on the OUTPUT HEADS ONLY (the
  #         encoder and GRU are shaped by evolution alone)
  #   ppo — full-network backprop via torch autograd, time-ordered
  #         sequence replay (GRU re-run over chunks), GAE(λ) advantages,
  #         PPO clipped updates, Adam + gradient clipping. Works with
  #         both brain versions. Falls back to a2c if torch is missing.
  # See docs/BRAIN_V2_V3_COMPARISON.md for the math behind both.
  algorithm: "a2c"
  ppo:
    learning_rate: 0.0003 # Adam step size (PPO ignores learning_rate below)
    seq_len: 8            # steps per sequence chunk (BPTT horizon)
    batch_size: 8         # chunks sampled per update
    gae_lambda: 0.95      # GAE λ: 0 = TD(0), 1 = Monte-Carlo
    clip_epsilon: 0.2     # PPO ratio clip ε
    value_coef: 0.5       # weight of the value loss
    entropy_coef: 0.01    # exploration bonus weight
    epochs: 2             # optimisation passes per sampled batch
    grad_clip: 0.5        # max gradient norm
    chunk_buffer: 64      # chunks kept in the replay buffer
    world_model_coef: 1.0 # weight of the dynamics-head auxiliary loss

  # Curiosity (Brain v3 Phase 4) — requires brain.world_model.enabled.
  # Intrinsic reward = weight * clip(zscore(prediction error), 0, clip):
  # surprising transitions are rewarded, replacing hand-crafted
  # exploration bonuses with an emergent signal.
  curiosity:
    enabled: false
    weight: 0.1   # intrinsic reward scale
    decay: 1.0    # per-step multiplicative weight decay (1.0 = constant)
    clip: 3.0     # cap in standard deviations
    warmup: 20    # samples before rewards start (stats stabilisation)

  learning_rate: 0.01
  discount_factor: 0.95
  batch_size: 12  # Lower batch to reduce per-update compute cost
  buffer_capacity: 1000
  epsilon: 0.15  # Exploration rate
  train_interval_ticks: 3  # More frequent policy updates to avoid passive collapse
  max_updates_per_tick: 12  # Initial global cap of learner updates per world tick
  stagger_updates: true  # Spread training across ticks by agent id
  adaptive_budget: true  # Auto-tune learning budget based on frame time
  min_updates_per_tick: 4  # Lower adaptive bound (maintain enough learning pressure)
  max_budget_updates_per_tick: 20  # Upper adaptive bound for high-pop stability
  budget_adjust_step: 1  # Budget change step when tuning
  budget_high_frame_factor: 1.10  # Reduce budget when frame > target*factor
  budget_low_frame_factor: 0.80  # Increase budget with healthy headroom
  compute_backend: auto  # auto | numpy | torch
  compute_device: auto  # auto | cpu | cuda | mps

# Reproduction Settings
reproduction:
  enabled: false  # Enable in-simulation reproduction
  energy_threshold: 0.60  # 60% of max_energy required
  min_age: 100  # Minimum age in ticks
  energy_split: 0.40  # Parent loses this percentage of energy
  mutation_std: 0.02  # Mutation standard deviation
  cooldown_ticks: 50  # Minimum ticks between reproductions
  max_population: 100 # Maximum total population (agents won't reproduce above this)

# Calamity Settings - Environmental Disasters
calamity:
  enabled: true  # Enable periodic calamities
  interval: 500  # Ticks between calamities
  destruction_rate: 0.70  # Percentage of resources destroyed (0.30 = 30%)
  affect_plants: true  # Whether to destroy plants
  affect_food: true  # Whether to destroy berries/food
  affect_seeds: false  # Whether to destroy seeds (false = seeds survive for recovery)

# Logging Settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_to_file: true
  log_directory: "data/logs"
  console_output: true

# Sand / Tile-Effect Tuning
# These override the built-in sand definition so you can tweak without code.
sand:
  spread_interval: 200     # Ticks a neighbour must be unprotected before spread (higher = slower)
  spread_chance: 0.05      # Per-tick probability once interval met (lower = slower)
  spread_radius: 1         # Manhattan distance for spreading (1 = adjacent only)
  spread_blocked_by:       # Object categories that block spreading
    - plant
  germination_multiplier: 0.1   # Multiplier on germination chance (0.1 = 10× harder)
  growth_multiplier: 0.1        # Multiplier on plant growth speed (0.1 = 10× slower)
  spawn_rate_multiplier: 0.3    # Multiplier on food production (0.3 = 70% less)
  fertility_override: 0.30      # Clamp fertility on sand (-1 = no clamp). At the seed
                                # threshold (0.3) so the ×0.1 multiplier does the work (B2 fix)
  moisture_override: 0.20       # Clamp moisture on sand (-1 = no clamp). At the seed
                                # threshold (0.2) — 0.05 made germination impossible (B2 fix)
  reclaim_terrain: "soil"       # Terrain to convert back to when a blocker is present ("" = disabled)
  reclaim_interval: 150         # Ticks a plant must sit on sand before it reclaims to soil (0 = disabled)
